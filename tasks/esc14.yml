---
# ESC14 - Weak Explicit Certificate Mapping via altSecurityIdentities
#
# ESC14 occurs when:
# - A user has GenericWrite/GenericAll permission on another user
# - This allows writing to the altSecurityIdentities attribute
# - An attacker can create a certificate and link it to the target user's altSecurityIdentities
# - Then authenticate as the target user using that certificate
#
# Prerequisites:
#   - StrongCertificateBindingEnforcement <= 1 on DC (applied below if not already set by ESC10)
#   - szOID_NTDS_CA_SECURITY_EXT disabled on CA (applied below if not already set by ESC16)
#   - CertSvc must be restarted after DisableExtensionList change
#
# Without the SID extension disabled, new certs embed the requester's SID and the KDC
# will reject authentication as a different user regardless of altSecurityIdentities.
#
# See: https://posts.specterops.io/adcs-esc14-abuse-technique-333a004dc2b9

- name: "ESC14 - Display configuration"
  ansible.builtin.debug:
    msg:
      - "Configuring ESC14 - GenericWrite on altSecurityIdentities"
      - "DC: {{ ludus_adcs_dc }} | CA: {{ ludus_adcs_ca_host }}"
      - "ESC14 User (attacker): {{ ludus_adcs_esc14_user }}"
      - "ESC14 Target User: {{ ludus_adcs_esc14_target_user }}"
      - "Create users: {{ ludus_adcs_esc14_create_users | default(true) }}"

# ============================================================================
# Prerequisite 1: StrongCertificateBindingEnforcement <= 1 on DC
# Without this, the KDC enforces strong binding and explicit mapping via
# altSecurityIdentities is ignored for cert auth.
# This is idempotent — if ESC10 already set it to 0, this is a no-op.
# ============================================================================

- name: "ESC14 prereq - Ensure StrongCertificateBindingEnforcement is disabled on DC"
  ansible.windows.win_powershell:
    script: |
      $regPath = "HKLM:\SYSTEM\CurrentControlSet\Services\Kdc"
      $regName = "StrongCertificateBindingEnforcement"

      if (-not (Test-Path $regPath)) {
          New-Item -Path $regPath -Force | Out-Null
      }

      $currentValue = Get-ItemProperty -Path $regPath -Name $regName -ErrorAction SilentlyContinue

      if ($null -ne $currentValue -and $currentValue.$regName -le 1) {
          Write-Output "StrongCertificateBindingEnforcement is already $($currentValue.$regName) (<=1) - OK for ESC14"
          $Ansible.Changed = $false
      } else {
          Set-ItemProperty -Path $regPath -Name $regName -Value 0 -Type DWord -Force
          Write-Output "Set StrongCertificateBindingEnforcement to 0 (required for ESC14)"
          $Ansible.Changed = $true
      }
  delegate_to: "{{ ludus_adcs_dc }}"

# ============================================================================
# Prerequisite 2: Disable szOID_NTDS_CA_SECURITY_EXT on CA
# Without this, new certificates embed the requester's SID. The KDC will see
# the cert belongs to the machine account (not the target user) and reject auth.
# This is idempotent — if ESC16 already configured it, this is a no-op.
# ============================================================================

# IMPORTANT: Use certutil WITHOUT -config flag when running locally on the CA.
# Using -config tries to connect via DCOM which can corrupt the CA config registry.
- name: "ESC14 prereq - Ensure szOID_NTDS_CA_SECURITY_EXT is disabled on CA"
  ansible.windows.win_powershell:
    script: |
      # Verify CertSvc is running before modifying config
      $svc = Get-Service -Name CertSvc -ErrorAction SilentlyContinue
      if (-not $svc -or $svc.Status -ne 'Running') {
          Write-Error "CertSvc is not running. Cannot modify DisableExtensionList."
          $Ansible.Failed = $true
          return
      }

      # Check if the OID is already in DisableExtensionList (local CA, no -config flag)
      $output = certutil -getreg policy\DisableExtensionList 2>&1
      if ($output -match "1\.3\.6\.1\.4\.1\.311\.25\.2") {
          Write-Output "szOID_NTDS_CA_SECURITY_EXT is already in DisableExtensionList - OK for ESC14"
          $Ansible.Changed = $false
      } else {
          # Use certutil -setreg without -config (targets local CA)
          $result = certutil -setreg policy\DisableExtensionList +1.3.6.1.4.1.311.25.2
          Write-Output "Added szOID_NTDS_CA_SECURITY_EXT to DisableExtensionList (required for ESC14)"
          Write-Output $result
          $Ansible.Changed = $true
      }
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ ludus_adcs_domain_username }}"
    ansible_become_password: "{{ ludus_adcs_domain_password }}"
  register: esc14_disable_ext_result

# CertSvc must be restarted for DisableExtensionList to take effect.
# After certutil -setreg, the service may fail to start without a reboot.
# Strategy: try graceful restart first, if that fails, reboot the server.
- name: "ESC14 prereq - Try to restart CertSvc gracefully"
  ansible.windows.win_powershell:
    script: |
      $svc = Get-Service -Name CertSvc -ErrorAction SilentlyContinue

      # Stop the service if it's running
      if ($svc -and $svc.Status -eq 'Running') {
          Stop-Service -Name CertSvc -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3
      }

      # Try to start it
      try {
          Start-Service -Name CertSvc -ErrorAction Stop
          Start-Sleep -Seconds 5
          $svc = Get-Service -Name CertSvc
          if ($svc.Status -eq 'Running') {
              Write-Output "CertSvc restarted successfully"
              $Ansible.Changed = $true
              $Ansible.Result.reboot_needed = $false
          } else {
              Write-Output "CertSvc did not reach Running state - reboot needed"
              $Ansible.Changed = $true
              $Ansible.Result.reboot_needed = $true
          }
      } catch {
          Write-Output "CertSvc failed to start: $($_.Exception.Message) - reboot needed"
          $Ansible.Changed = $true
          $Ansible.Result.reboot_needed = $true
      }
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ ludus_adcs_domain_username }}"
    ansible_become_password: "{{ ludus_adcs_domain_password }}"
  register: esc14_restart_result
  when: esc14_disable_ext_result.changed | default(true)

- name: "ESC14 prereq - Reboot CA server if CertSvc cannot restart"
  ansible.windows.win_reboot:
    reboot_timeout: 300
    post_reboot_delay: 30
  when:
    - esc14_disable_ext_result.changed | default(true)
    - esc14_restart_result.result.reboot_needed | default(false)

- name: "ESC14 prereq - Verify CertSvc is running after restart/reboot"
  ansible.windows.win_service:
    name: CertSvc
    state: started
    start_mode: auto
  register: esc14_certsvc_final
  retries: 3
  delay: 15
  until: esc14_certsvc_final is not failed
  when: esc14_disable_ext_result.changed | default(true)

# ============================================================================
# ESC14 core configuration
# ============================================================================

# Only create users if ludus_adcs_esc14_create_users is true (default)
# This allows using pre-existing users (e.g., from GOAD bulk user creation)

- name: "ESC14 - Create ESC14 attacker user"
  microsoft.ad.user:
    name: "{{ ludus_adcs_esc14_user }}"
    password: "{{ ludus_adcs_esc14_password }}"
    upn: "{{ ludus_adcs_esc14_user }}"
    password_never_expires: true
    user_cannot_change_password: true
    description: "ESC14 - User with GenericWrite on altSecurityIdentities of target"
    state: present
    domain_username: "{{ ludus_adcs_domain_username }}"
    domain_password: "{{ ludus_adcs_domain_password }}"
    domain_server: "{{ ludus_adcs_dc_ip }}"
  when: ludus_adcs_esc14_create_users | default(true) | bool

- name: "ESC14 - Create ESC14 target user"
  microsoft.ad.user:
    name: "{{ ludus_adcs_esc14_target_user }}"
    password: "{{ ludus_adcs_esc14_target_password }}"
    upn: "{{ ludus_adcs_esc14_target_user }}"
    password_never_expires: true
    user_cannot_change_password: true
    description: "ESC14 - Target user with vulnerable altSecurityIdentities"
    state: present
    domain_username: "{{ ludus_adcs_domain_username }}"
    domain_password: "{{ ludus_adcs_domain_password }}"
    domain_server: "{{ ludus_adcs_dc_ip }}"
  when: ludus_adcs_esc14_create_users | default(true) | bool

# Grant GenericWrite from ESC14 attacker user to target user
# This allows writing to altSecurityIdentities
# Idempotent - checks if ACE already exists
- name: "ESC14 - Grant GenericWrite permission from attacker to target"
  ansible.windows.win_powershell:
    script: |
      param($AttackerUser, $TargetUser)

      Import-Module ActiveDirectory
      Set-Location AD:

      # Get the attacker's SID
      $attackerObj = Get-ADUser -Filter "SamAccountName -eq '$AttackerUser'" -Properties objectSID
      if (-not $attackerObj) {
          Write-Error "Attacker user '$AttackerUser' does not exist. Cannot configure ESC14."
          $Ansible.Failed = $true
          return
      }
      $attackerSID = New-Object System.Security.Principal.SecurityIdentifier ($attackerObj.objectSID)

      # Get the target user's DN
      $targetObj = Get-ADUser -Filter "SamAccountName -eq '$TargetUser'"
      if (-not $targetObj) {
          Write-Error "Target user '$TargetUser' does not exist. Cannot configure ESC14."
          $Ansible.Failed = $true
          return
      }
      $targetDN = $targetObj.DistinguishedName

      # Get the current ACL
      $acl = Get-Acl -Path "$targetDN"

      # Check if ACE already exists
      $existingAce = $acl.Access | Where-Object {
          $_.IdentityReference.Value -match $AttackerUser -and
          $_.ActiveDirectoryRights -match "GenericWrite"
      }

      if ($existingAce) {
          Write-Output "GenericWrite ACE from $AttackerUser to $TargetUser already exists"
          $Ansible.Changed = $false
      } else {
          # Create the GenericWrite ACE
          $adRight = [System.DirectoryServices.ActiveDirectoryRights]::GenericWrite
          $type = [System.Security.AccessControl.AccessControlType]::Allow
          $inheritanceType = [System.DirectoryServices.ActiveDirectorySecurityInheritance]::None

          $ace = New-Object System.DirectoryServices.ActiveDirectoryAccessRule $attackerSID, $adRight, $type, $inheritanceType

          # Add the ACE
          $acl.AddAccessRule($ace)
          Set-Acl -AclObject $acl -Path "$targetDN"

          Write-Output "Granted GenericWrite from $AttackerUser to $TargetUser"
          Write-Output "ESC14 attack path enabled - attacker can write to altSecurityIdentities"
          $Ansible.Changed = $true
      }
    parameters:
      AttackerUser: "{{ ludus_adcs_esc14_user }}"
      TargetUser: "{{ ludus_adcs_esc14_target_user }}"
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ ludus_adcs_domain_username }}"
    ansible_become_password: "{{ ludus_adcs_domain_password }}"
  delegate_to: "{{ ludus_adcs_dc }}"
