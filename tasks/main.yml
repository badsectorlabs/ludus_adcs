---
- name: Install ADCS
  ansible.windows.win_feature:
    name: AD-Certificate
    state: present
    include_sub_features: true
    include_management_tools: true

- name: Import the ADCSAdministration module
  community.windows.win_psmodule:
    name: ADCSAdministration
    state: present

- name: Install-WindowsFeature ADCS-Cert-Authority
  ansible.windows.win_feature:
    name: ADCS-Cert-Authority
    state: present
    include_management_tools: true

- name: Install-WindowsFeature ADCS-Web-Enrollment
  ansible.windows.win_feature:
    name: ADCS-Web-Enrollment
    state: present
  when: ludus_adcs_esc8

# Install and configure CA with full recovery logic:
# 1. Install CA
# 2. Try to start CertSvc
# 3. If it fails → reboot → try again
# 4. If STILL fails → uninstall CA, reboot, reinstall CA, reboot → start
- name: Install CA and ensure CertSvc is running
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param (
          [String]$domain_username,
          [String]$domain_password,
          [String]$ca_common_name
      )

      $pass = ConvertTo-SecureString $domain_password -AsPlainText -Force
      $Cred = New-Object System.Management.Automation.PSCredential ($domain_username, $pass)

      function Install-CA {
          try {
              $result = Install-AdcsCertificationAuthority -Credential $Cred `
                  -CAType EnterpriseRootCA `
                  -CryptoProviderName "RSA#Microsoft Software Key Storage Provider" `
                  -KeyLength 2048 -HashAlgorithmName SHA256 `
                  -ValidityPeriod Years -ValidityPeriodUnits 5 `
                  -CACommonName $ca_common_name -Force
              Write-Output "CA installed successfully"
              return $true
          } catch [Microsoft.CertificateServices.Deployment.Common.CA.CertificationAuthoritySetupException] {
              Write-Output "CA already configured: $($_.Exception.Message)"
              return $false
          } catch {
              Write-Output "CA install failed: $($_.Exception.Message)"
              throw $_
          }
      }

      function Test-CertSvc {
          try {
              Start-Service -Name CertSvc -ErrorAction Stop
              Start-Sleep -Seconds 5
              $svc = Get-Service -Name CertSvc -ErrorAction Stop
              return ($svc.Status -eq 'Running')
          } catch {
              Write-Output "CertSvc failed to start: $($_.Exception.Message)"
              return $false
          }
      }

      # Step 1: Install CA (or detect already installed)
      $freshInstall = Install-CA

      # Step 2: Check if CertSvc is running
      $svc = Get-Service -Name CertSvc -ErrorAction SilentlyContinue
      if ($svc -and $svc.Status -eq 'Running') {
          Write-Output "CertSvc is already running - CA is healthy"
          $Ansible.Changed = $freshInstall
          return
      }

      # Step 3: Try to start CertSvc
      if (Test-CertSvc) {
          Write-Output "CertSvc started successfully"
          $Ansible.Changed = $true
          return
      }

      # Step 4: CertSvc won't start — need a reboot
      Write-Output "CertSvc cannot start - requesting reboot"
      $Ansible.Changed = $true
      $Ansible.Result = @{ certsvc_needs_reboot = $true }
    error_action: stop
    parameters:
      domain_username: "{{ ludus_adcs_domain_username }}"
      domain_password: "{{ ludus_adcs_domain_password }}"
      ca_common_name: "{{ ludus_adcs_ca_common_name }}"
  register: adcs_ca_install_result

# Reboot if CertSvc couldn't start
- name: Reboot CA server (CertSvc needs reboot to start)
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 60
  when: (adcs_ca_install_result.result.certsvc_needs_reboot | default(false)) | bool

# After reboot, try to start CertSvc
- name: Try to start CertSvc after reboot
  ansible.windows.win_service:
    name: CertSvc
    state: started
    start_mode: auto
  register: certsvc_after_reboot
  retries: 3
  delay: 30
  until: certsvc_after_reboot is not failed
  ignore_errors: true
  when: (adcs_ca_install_result.result.certsvc_needs_reboot | default(false)) | bool

# Recovery: If CertSvc STILL won't start, the CA is corrupt.
# Uninstall CA config, reboot, reinstall, reboot again.
- name: "Recovery - Uninstall broken CA configuration"
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param ([String]$domain_username, [String]$domain_password)
      $pass = ConvertTo-SecureString $domain_password -AsPlainText -Force
      $Cred = New-Object System.Management.Automation.PSCredential ($domain_username, $pass)
      try {
          Uninstall-AdcsCertificationAuthority -Force
          Write-Output "CA uninstalled successfully"
          $Ansible.Changed = $true
      } catch {
          Write-Output "Uninstall attempt: $($_.Exception.Message)"
          $Ansible.Changed = $false
      }
    parameters:
      domain_username: "{{ ludus_adcs_domain_username }}"
      domain_password: "{{ ludus_adcs_domain_password }}"
  when: certsvc_after_reboot is defined and certsvc_after_reboot is failed

- name: "Recovery - Reboot after CA uninstall"
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 60
  when: certsvc_after_reboot is defined and certsvc_after_reboot is failed

- name: "Recovery - Reinstall CA after cleanup"
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param ([String]$domain_username, [String]$domain_password, [String]$ca_common_name)
      $pass = ConvertTo-SecureString $domain_password -AsPlainText -Force
      $Cred = New-Object System.Management.Automation.PSCredential ($domain_username, $pass)
      Install-AdcsCertificationAuthority -Credential $Cred `
          -CAType EnterpriseRootCA `
          -CryptoProviderName "RSA#Microsoft Software Key Storage Provider" `
          -KeyLength 2048 -HashAlgorithmName SHA256 `
          -ValidityPeriod Years -ValidityPeriodUnits 5 `
          -CACommonName $ca_common_name -Force -OverwriteExistingKey
      $Ansible.Changed = $true
    error_action: stop
    parameters:
      domain_username: "{{ ludus_adcs_domain_username }}"
      domain_password: "{{ ludus_adcs_domain_password }}"
      ca_common_name: "{{ ludus_adcs_ca_common_name }}"
  when: certsvc_after_reboot is defined and certsvc_after_reboot is failed

- name: "Recovery - Reboot after CA reinstall"
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 60
  when: certsvc_after_reboot is defined and certsvc_after_reboot is failed

- name: "Ensure CertSvc service is running"
  ansible.windows.win_service:
    name: CertSvc
    state: started
    start_mode: auto
  register: certsvc_final
  retries: 5
  delay: 30
  until: certsvc_final is not failed

- name: Enable Web enrollment
  ansible.windows.win_powershell:
    script: |
      [CmdletBinding()]
      param ()
      try {
        Install-AdcsWebEnrollment -Force
        $Ansible.Changed = $true
      } catch [Microsoft.CertificateServices.Deployment.Common.WEP.WebEnrollmentSetupException] {
        # Web Enrollment is already installed
        Write-Output $_.Exception.Message
        $Ansible.Changed = $false
      } catch {
        $Ansible.Changed = $false
        $Ansible.Failed = $true
        throw $_
      }
  when: ludus_adcs_esc8

- name: Dismiss Server Manager 'Configuration Required' notification for ADCS
  ansible.windows.win_powershell:
    script: |
      # Clear the Server Manager post-deployment configuration flag for ADCS roles
      # This dismisses the yellow "Configuration required" notification in Server Manager
      # that appears when ADCS is configured via PowerShell instead of the GUI wizard.

      $smRegPath = "HKLM:\SOFTWARE\Microsoft\ServerManager\ServicingStorage\ServerComponentCache"

      # Mark AD-Certificate role services as configured
      $adcsComponents = @(
        "AD-Certificate",
        "ADCS-Cert-Authority",
        "ADCS-Web-Enrollment"
      )

      foreach ($component in $adcsComponents) {
        $componentPath = Join-Path $smRegPath $component
        if (Test-Path $componentPath) {
          $current = Get-ItemProperty -Path $componentPath -Name "ConfigurationStatus" -ErrorAction SilentlyContinue
          if ($null -eq $current -or $current.ConfigurationStatus -ne 2) {
            Set-ItemProperty -Path $componentPath -Name "ConfigurationStatus" -Value 2 -Type DWord -Force
            $Ansible.Changed = $true
          }
        }
      }

      # Alternative approach: notify Server Manager the configuration is done via BPA
      # This uses the ServerManager module to refresh its state
      try {
        Import-Module ServerManager -ErrorAction SilentlyContinue
        # Verify CertSvc service is running as proof CA is configured
        $certSvc = Get-Service -Name CertsVc -ErrorAction SilentlyContinue
        if ($certSvc -and $certSvc.Status -eq 'Running') {
          Write-Output "CertSvc is running - CA is properly configured"
        } else {
          Write-Output "Warning: CertSvc service not found or not running"
        }
      } catch {
        Write-Output "ServerManager module not available: $($_.Exception.Message)"
      }
  changed_when: false

- name: Copy the ADCSTemplate Module to CA
  win_copy:
    src: files/ADCSTemplate
    dest: "C:\\Program Files\\WindowsPowerShell\\Modules"

- name: Install Active Directory Windows Features (needed for ADCSTemplate module)
  win_feature:
      name: RSAT-AD-Tools
      include_management_tools: yes
      include_sub_features: yes
      state: present

- name: Import the ADCSTemplate Module
  community.windows.win_psmodule:
    name: ADCSTemplate
    state: present

- name: Create a directory for templates
  ansible.windows.win_file:
    path: c:\ludus\adcs
    state: directory

- name: Copy templates json
  ansible.windows.win_copy:
    src: "files/{{ adcs_template_name }}.json"
    dest: "C:\\ludus\\adcs\\{{ adcs_template_name }}.json"
  loop:
    - ESC1
    - ESC2
    - ESC3
    - ESC3_CRA
    - ESC4
    - ESC7_CertMgr
    - ESC9
    - ESC13
  loop_control:
    loop_var: adcs_template_name

- name: Convert vars to dictionary and filter true values
  ansible.builtin.set_fact:
    escs_to_enable: "{{ dict(
      esc1=ludus_adcs_esc1,
      esc2=ludus_adcs_esc2,
      esc3=ludus_adcs_esc3,
      esc3_cra=ludus_adcs_esc3_cra,
      esc4=ludus_adcs_esc4,
      esc7_certmgr=ludus_adcs_esc7,
      esc9=ludus_adcs_esc9,
      esc13=ludus_adcs_esc13,
    ) | dict2items | selectattr('value', 'equalto', true) | map(attribute='key') | list }}"

- name: Install templates
  ansible.windows.win_shell: |
    $sourceFile = "{{ adcs_template_name }}"
    $displayName = "{{ adcs_display_name }}"

    Write-Host "Processing: SourceFile='$sourceFile.json' DisplayName='$displayName'"

    if (-not(Get-ADCSTemplate -DisplayName "$displayName")) {
      Write-Host "Creating template '$displayName' from $sourceFile.json"
      New-ADCSTemplate -DisplayName "$displayName" `
        -JSON (Get-Content "c:\ludus\adcs\$sourceFile.json" -Raw) `
        -Identity "{{ domain_name }}\Domain Users" `
        -Publish
      Write-Host "Successfully created template '$displayName'"
    } else {
      Write-Host "Template '$displayName' already exists, skipping"
    }
  vars:
    ansible_become: true
    ansible_become_method: runas
    domain_name: "{{ ludus_adcs_domain }}"
    ansible_become_user: "{{ ludus_adcs_domain_username }}"
    ansible_become_password: "{{ ludus_adcs_domain_password }}"
    adcs_display_name: "{{ ludus_adcs_template_display_names[adcs_template_name] | default(adcs_template_name) }}"
  loop: "{{ escs_to_enable | map('upper') | list }}" 
  loop_control:
    loop_var: adcs_template_name

# IMPORTANT: Use certutil WITHOUT -config flag when running locally on the CA.
# Using -config connects via DCOM which can corrupt the CA Configuration registry.
- name: "Configure ATTRIBUTESUBJECTALTNAME2 on CA - ESC6"
  ansible.windows.win_powershell:
    script: |
      # Verify CertSvc is running before modifying config
      $svc = Get-Service -Name CertSvc -ErrorAction SilentlyContinue
      if (-not $svc -or $svc.Status -ne 'Running') {
          Write-Error "CertSvc is not running. Cannot modify Editflags."
          $Ansible.Failed = $true
          return
      }

      # Check if already set (no -config flag — targets local CA)
      $output = certutil -getreg policy\Editflags 2>&1
      if ($output -match "EDITF_ATTRIBUTESUBJECTALTNAME2") {
          Write-Output "EDITF_ATTRIBUTESUBJECTALTNAME2 is already set"
          $Ansible.Changed = $false
      } else {
          $result = certutil -setreg policy\Editflags +EDITF_ATTRIBUTESUBJECTALTNAME2
          Write-Output "Added EDITF_ATTRIBUTESUBJECTALTNAME2"
          Write-Output $result
          $Ansible.Changed = $true
      }
  vars:
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: "{{ ludus_adcs_domain_username }}"
    ansible_become_password: "{{ ludus_adcs_domain_password }}"
  when: ludus_adcs_esc6 is true

- name: Set up ESC4
  include_tasks: esc4.yml
  when: ludus_adcs_esc4 is true

- name: Set up ESC5
  include_tasks: esc5.yml
  when: ludus_adcs_esc5 is true

- name: Set up ESC7
  include_tasks: esc7.yml
  when: ludus_adcs_esc7 is true

- name: Set up ESC9
  include_tasks: esc9.yml
  when: ludus_adcs_esc9 is true

- name: Set up ESC10
  include_tasks: esc10.yml
  when: ludus_adcs_esc10 is true

- name: Set up ESC11
  include_tasks: esc11.yml
  when: ludus_adcs_esc11 is true

- name: Set up ESC13
  include_tasks: esc13.yml
  when: ludus_adcs_esc13 is true

- name: Set up ESC15
  include_tasks: esc15.yml
  when: ludus_adcs_esc15 is true

# ESC16 must run before ESC14 — ESC16 disables the SID extension on the CA,
# which ESC14 requires so that new certs don't embed the requester's SID.
- name: Set up ESC16
  include_tasks: esc16.yml
  when: ludus_adcs_esc16 is true

- name: Set up ESC14
  include_tasks: esc14.yml
  when: ludus_adcs_esc14 is true

- name: Refresh
  ansible.windows.win_command: gpupdate /force

